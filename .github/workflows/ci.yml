name: qfs CI

# CI for the Rust `qfs` workspace (RFD-0001 epic E0). The toolchain is read from
# `rust-toolchain.toml` (channel = stable, with rustfmt + clippy and the two Linux
# targets). No secrets, no credentials are used anywhere in this workflow
# (acceptance criterion: no live credentials in the build / tests / CI).

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# The Cargo workspace lives under packages/qfs/ (monorepo layout). All `run:` steps
# execute there; `uses:` actions (checkout, rust-cache, upload-artifact) take explicit paths.
defaults:
  run:
    working-directory: packages/qfs

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (from rust-toolchain.toml)
        run: rustup show
      - run: cargo fmt --all --check

  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/qfs
          # A per-job cache key: every job on ubuntu-latest shares the host arch, so without a
          # distinct key two parallel jobs derive the SAME key and the second's save fails with
          # "Unable to reserve cache … another job may be creating this cache" (a red, benign log
          # line). A unique key per job gives each its own cache — no reservation collision.
          key: clippy
      - name: Install toolchain (from rust-toolchain.toml)
        run: rustup show
      # NOT `--all-features`: qfs-host's `host-daemon` and `host-workers` are mutually exclusive
      # (a compile_error fires if both are on), so `--all-features` can never compile. Lint the
      # default feature set across the workspace, then each host deployment feature on its own.
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy -p qfs-host --all-targets --features host-daemon -- -D warnings
      - run: cargo clippy -p qfs-host --all-targets --features host-workers -- -D warnings

  build-test:
    name: build + test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/qfs
          key: build-test
      - name: Install toolchain (from rust-toolchain.toml)
        run: rustup show
      - run: cargo build --workspace
      - run: cargo test --workspace

  cross:
    name: cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/qfs
          key: cross-${{ matrix.target }}
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Install aarch64 cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      # x86_64 is native on the ubuntu runner (full binary link); aarch64 uses the
      # cross-linker installed above. Both build the whole workspace including the
      # `qfs` binary.
      - name: Build workspace for target
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --workspace --target ${{ matrix.target }}

  # packages/qfs-viewer: the fresh-clone BACKSTOP gate for the imported qfs-viewer project
  # (TypeScript, plgg family). One call to its canonical runner, identical to what a developer
  # runs locally, so the local and CI paths cannot drift — mirrors the standalone repo's old
  # run-tests.yml (setup-node 24.x + npm-install.sh + check-all.sh).
  viewer-check-all:
    name: qfs-viewer check-all
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/qfs-viewer
    steps:
      - uses: actions/checkout@v4

      # Node 24: the version the launcher's node_modules type-stripping
      # behaviour is pinned against (see packages/qfs-viewer/docs/adr/0005).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Install every package's dependencies
        run: ./scripts/npm-install.sh

      - name: Check all (gates + fresh build + npx smoke + full test suite)
        run: ./scripts/check-all.sh

  # t36: the wasm-clean qfs-host CORE builds on wasm32-unknown-unknown (the RuntimeHost/
  # DurableStore traits, the owned DTOs, the wrangler generator, the binding-set derivation,
  # and the parked host-workers scaffold). The `worker`-backed WorkersHost is PARKED (the
  # `worker` crate is not yet a dependency — docs/adr/0005-deployment-hosts.md), so this job
  # builds the wasm-clean core, NOT a `worker` cdylib.
  wasm32-host-core:
    name: wasm32 (qfs-host core, t36)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/qfs
          key: wasm32
      - run: rustup target add wasm32-unknown-unknown
      # Default features = the wasm-clean core (no tokio, no qfs-server, no worker).
      - run: cargo build -p qfs-host --target wasm32-unknown-unknown
      # The parked host-workers scaffold also builds for wasm32 (the archetype->primitive mapping).
      - run: cargo build -p qfs-host --target wasm32-unknown-unknown --features host-workers

  # t36 RELEASE job: emit the deployment artifacts — static musl binaries (both arches), the
  # qfs.wasm size-optimized module, the wrangler.toml template, and a SHA256SUMS. Gated on a tag
  # push so a normal CI run does not produce release artifacts. The musl static link is CI-ONLY
  # (the local trip host has no x86_64 musl cross-linker — t01/A2); this job installs `musl-tools`
  # + the cross-linkers so the static binaries link here.
  release-artifacts:
    name: release artifacts (musl + wasm + wrangler + checksums)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/qfs
          key: release-artifacts
      - name: Add release targets
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl
          rustup target add wasm32-unknown-unknown
      - name: Install musl + cross linkers
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
      - name: Build release artifacts
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: bash deploy/release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: qfs-release
          path: packages/qfs/dist/
