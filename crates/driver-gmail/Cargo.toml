[package]
name = "cfs-driver-gmail"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "cfs Gmail driver (RFD-0001 §5, E4 t20): the first real Driver, subsuming the legacy Go gmail-ftp as one mount at /mail under the uniform VFS + pipe-SQL DSL. Maps the mailbox onto the Append/log archetype (labels = directories, messages = files, attachments = nested). Implements the t13 Driver contract (describe/capabilities/procedures/prelude/pushdown/applier) over the t19 GoogleApiClient (bearer injection + refresh-on-401, multi-account TokenSource). SELECT pushes WHERE/LIMIT to the Gmail search q=; REMOVE trashes a message/thread (never permanent delete); INSERT/UPSERT INTO /mail/drafts builds multipart-MIME drafts; UPDATE modifies labels; CALL mail.send (and the SEND prelude alias) is the irreversible transition. Owned DTOs only — no google-apis SDK; the GmailClient seam mocks in tests so no live network is touched. Tokens are cfs_secrets::Secret behind the auth base; never logged, never in errors. Bridges its synchronous PlanApplier to the runtime async ApplyDriver via cfs-runtime's PlanApplierBridge (a runtime leaf)."

[features]
# Exposes test-only DTO constructors (`MailMessage::for_test`, `MailDraft::for_test`) so a
# downstream consumer can fabricate the otherwise `#[non_exhaustive]` DTOs to seed the public
# `MockGmailClient` in their own integration tests — without opening the production surface.
test-util = []

[dependencies]
# The introspective Driver contract (t13): trait, archetype/capability/pushdown DTOs,
# the shared CfsError, and the Path boundary adapter.
cfs-driver = { path = "../driver" }
# The effect substrate (t06/t09): EffectKind/EffectNode/Target/VfsPath + the synchronous
# PlanApplier seam the runtime bridge drives.
cfs-plan = { path = "../plan" }
# The canonical typed row model + Schema/DriverId (t05) the describe schema and the
# decoded message rows speak.
cfs-types = { path = "../types" }
# The pure bytes <-> rows codec contract (t15): a message/thread body becomes a relation via
# a registered Codec when needed. This driver holds NO format-specific code beyond the MIME
# builder; structured decode leans on the codec registry.
cfs-codec = { path = "../codec" }
# The async interpreter side: the ApplyDriver/DriverRegistry the bridge registers into and
# the PlanApplierBridge that adapts this driver's synchronous applier. tokio is confined to
# cfs-runtime + leaf driver-impl consumers (this crate), so cfs-plan's purity dep-closure
# test stays green.
cfs-runtime = { path = "../runtime" }
# The shared Google OAuth2 + multi-account auth base (t19): the GoogleApiClient (bearer
# injection + refresh-on-401), the per-account TokenSource, and the local HttpExchange seam.
# This crate adapts an HttpExchange over cfs_http_core DTOs; reqwest stays in cfs-driver-http.
cfs-google-auth = { path = "../google-auth" }
# The shared pure HTTP DTO + redaction leaf (t19 refinement): HttpRequest/HttpResponse the
# GoogleApiClient sends, with the single SENSITIVE_HEADERS redaction authority.
cfs-http-core = { path = "../http-core" }
# Owned DTOs (de)serialize from the Gmail JSON; no google SDK type ever crosses the boundary.
serde = { workspace = true }
serde_json = { workspace = true }
# Structured, secret-free GmailError taxonomy (RFD §5, AI-consumable).
thiserror = { workspace = true }
# Structured request/lifecycle logging at debug, with token values redacted (the HttpRequest
# Debug redacts the Authorization header).
tracing = { workspace = true }

[dev-dependencies]
# Tests drive the synchronous machinery + the async bridge against an in-memory mock
# GmailClient (scripted Gmail JSON + recorded requests) and an InMemoryStore — no live Gmail,
# no network. End-to-end COMMIT tests drive the async interpreter through #[tokio::test].
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
serde_json = { workspace = true }

[lints]
workspace = true
