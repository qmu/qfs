[package]
name = "cfs-watchtower"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "cfs watchtower (t34, RFD-0001 §8): the 'cause' side of the server runtime that turns external change into fired effect-plans. Two cause sources — inbound WEBHOOKs (HMAC-verified ingress) and polling source WATCHERs (cursor-diff over the read path) — emit normalized owned `Event` DTOs onto an internal `EventBus`; registered TRIGGERs match an event, evaluate the optional `WHERE` over `NEW.*` (a pure predicate evaluator), bind `NEW.*` into the handler plan, lower to a Plan, pass the policy gate hook, and COMMIT through an INJECTED Committer (the cfs-cron pattern — cfs-watchtower never drives the COMMIT interpreter, so it stays off cfs-runtime). Delivery is AT-LEAST-ONCE: ack only after a successful COMMIT, a durable spool redelivers an un-acked event on crash, and a `dedup_key` carried end-to-end + an idempotency ledger make a re-delivered Event a no-op after its first net effect (idempotent handlers, RFD §6). Signing secrets are resolved BY HANDLE from cfs-secrets (t27), never inlined, never logged; the HMAC verify uses the shared pure cfs-crypto-core leaf with a constant-time compare. The PURE event/dispatch DTOs + predicate evaluator + dedup ledger have ZERO tokio (the LocalBus MPSC + watcher tasks are behind the default-on `native` feature, the t25/t33 pattern) and build for wasm32-unknown-unknown (the CF Queues/DO mapping). A LEAF: only the `cfs` binary consumes it (the serve composition root, the watchtower sibling of cfs-http/cfs-cron); its feature-gated tokio dead-ends in the terminal binary and it does NOT depend on cfs-runtime, so the cfs-exec-consumer + runtime-leaf confinement guards stay green. cfs-watchtower does NOT depend on cfs-http and serves no HTTP itself: its WebhookBinding exposes a pure ingest handler over owned request data that the BINARY composes into the cfs-http listener (option b), so neither leaf depends on the other."

[features]
default = ["native"]
# The native side. The PURE watchtower core (the owned Event/EventKind/dedup_key DTOs, the
# EventBus/WatcherStore/Committer/PolicyGate TRAITS, the pure WHERE predicate evaluator over
# NEW.*, the NEW.* plan binding, and the dedup idempotency ledger) depends ONLY on the tokio-free,
# wasm-clean spine crates (cfs-core/cfs-parser/cfs-pushdown/cfs-types/cfs-secrets/cfs-crypto-core),
# so it builds for wasm32-unknown-unknown with `--no-default-features`. `native` gates the things
# that CANNOT be wasm-clean and are composition wiring anyway: (1) cfs-exec (the read path's
# build_plan/execute_read — pulls tokio's full feature set), (2) cfs-server (the Binding/registry
# seam — pulls tokio signal/mio, no-wasm), and (3) tokio (the LocalBus MPSC + watcher tasks). The
# load-bearing wasm fence is the ABSENCE of `native` (these deps are `optional`), not any marker
# (the t25/t33 lesson). The binary always builds with `native` on, so the real LocalBus +
# WatchtowerBinding + watcher daemon are present in production.
native = ["dep:cfs-exec", "dep:cfs-server", "dep:tokio"]

[dependencies]
# The hub: Plan / commit / RecordingApplier, the owned Value/Row/Literal type model, the
# rehydratable PlanSpec/StatementSpec (the t31 canonical DO/WHERE body), and the Statement AST
# re-export. cfs-core's closure is the tokio-free pure spine, so the pure watchtower core stays
# wasm-clean through it.
cfs-core = { path = "../core" }
# The parser AST (Statement/Expr/Pipeline/PipeOp) the WHERE predicate is extracted from + the
# NEW.* plan binding walks. tokio-free.
cfs-parser = { path = "../parser" }
# The Expr -> typed Predicate lowering (`lower_predicate`) the pure WHERE evaluator runs over NEW.*.
cfs-pushdown = { path = "../pushdown" }
# The canonical typed row model (Predicate/Row/Value/Schema/Column) the Event payload and the
# WHERE evaluation speak.
cfs-types = { path = "../types" }
# The single secrets surface (t27): the webhook signing secret is a cfs_secrets::Secret resolved
# only at verify time BY HANDLE, never inlined in WebhookDef, never logged.
cfs-secrets = { path = "../secrets" }
# The shared pure crypto leaf (t34): HMAC-SHA256 + constant_time_eq verifying the inbound webhook
# signature. A TRUE pure leaf (zero deps, std-only), so it adds no runtime/native coupling and
# stays wasm-clean for the CF Workers WEBHOOK ingress.
cfs-crypto-core = { path = "../crypto-core" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
# The read executor (execute_read for watcher polling) + build_plan (lowering the handler DO body
# to a Plan). cfs-watchtower is a LEAF integration consumer of the executor, the same role
# cfs-cmd / cfs-http / cfs-cron play (the t29 CO-t29-4 allowlist is extended for cfs-watchtower).
# OPTIONAL behind `native`: it pulls tokio's full feature set (no-wasm).
cfs-exec = { path = "../exec", optional = true }
# The Binding/ServerState/TriggerDef/WebhookDef registry + reconcile seam the WatchtowerBinding
# converges to + the AuditSink. OPTIONAL behind `native`: cfs-server pulls tokio signal (mio,
# no-wasm), so the wasm core excludes it.
cfs-server = { path = "../server", optional = true }
# The native LocalBus MPSC + watcher tasks. tokio is used HERE for the event-bus/watcher domain
# only; cfs-watchtower does NOT depend on cfs-runtime (the real commit path is the injected
# Committer), so the runtime-leaf-confinement guard is untouched, and as a terminal-consumed leaf
# tokio dead-ends in the binary. OPTIONAL + default-on so the pure core builds for wasm32.
tokio = { version = "1", default-features = false, features = ["rt", "macros", "time", "sync"], optional = true }

[dev-dependencies]
# The in-memory fakes (counting committer, fake read driver) the tests drive — no live network/creds.
tokio = { version = "1", default-features = false, features = ["rt", "macros", "time", "sync"] }

[lints]
workspace = true
