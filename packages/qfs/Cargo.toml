[workspace]
resolver = "2"
# `crates/*` are production members. `spikes/*` are THROWAWAY t02 comparison
# evidence (publish = false), kept in the workspace so they build/fmt/clippy with
# the rest but never ship. See docs/adr/0001-parser-library.md.
# `xtask` is the cargo-xtask build tool (t40): gen-docs + dist. `publish = false`, NOT
# shipped in the binary; it builds/fmt/clippy with the workspace. Invoke it with
# `cargo run -p xtask -- <cmd>` (or the `cargo xtask` alias from `.cargo/config.toml`).
members = ["crates/*", "spikes/*", "xtask"]

[workspace.package]
edition = "2021"
rust-version = "1.96"
license = "MIT"
authors = ["a@qmu.jp"]
repository = "https://github.com/qmu/qfs"

# Shared dependency versions. Members opt in via `dep = { workspace = true }`.
# Versions are caret-resolved against the pre-warmed cargo cache (A2 ground truth);
# do NOT pin older versions here.
[workspace.dependencies]
clap = { version = "4", features = ["derive"] }
thiserror = "2"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# Async runtime + combinators for the effect interpreter. tokio/futures are deliberately
# CONFINED to qfs-runtime (only that crate opts in) so qfs-plan's purity dep-closure test
# (which forbids tokio/async runtimes) stays green — the effect substrate stays I/O-free.
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync", "time"] }
futures = "0.3"
# `async fn` in the consumer-side ApplyDriver trait (object-safe `dyn ApplyDriver`).
# Confined to qfs-runtime alongside tokio.
async-trait = "0.1"

# Workspace-wide lints. Inherited by each member via `[lints] workspace = true`.
# The strict unwrap/expect/panic policy enforces the t01 "no unwrap/expect/panic in
# libs" rule structurally (Considerations / implementation policy). Test code is
# exempted per-crate with `#![cfg_attr(test, allow(...))]`.
[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"

# --- t36 deployment build profiles (RFD-0001 §9; docs/adr/0005-deployment-hosts.md) ---
# The native release profile for the EC2 daemon (`cargo build --release --features host-daemon`).
# The release JOB cross-links static `x86_64`/`aarch64-unknown-linux-musl` binaries IN CI (the
# local host has no x86_64 musl linker — t01/A2 established cross-link is CI-only), but the
# profile itself is verified locally via the NATIVE release build.
[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true

# The wasm size profile for the CF Workers `qfs.wasm` artifact (RFD §9: lean wasm). Cargo has no
# per-target profile, so the release JOB selects this via `--profile wasm-release` when building
# `--target wasm32-unknown-unknown --features host-workers`. `opt-level="z"` + fat LTO + strip +
# `panic="abort"` minimize the module size (the 128 MB / CPU-time Worker limits, RFD §6).
[profile.wasm-release]
inherits = "release"
opt-level = "z"
lto = true
strip = true
panic = "abort"
