[package]
name = "qfs-driver-cf"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs Cloudflare driver (RFD-0001 §5, E4 t23): one driver crate mounted at /cf exposing three Cloudflare primitives through the uniform DSL, each on its correct archetype. D1 (/cf/d1/<db>/<table>) is the relational/table archetype — it REUSES the t17 qfs-driver-sql sqlite Dialect emitter (render_select/render_dml), the pure query compiler, and the catalog DTOs; D1 is SQLite-over-HTTP, so the only new piece is an HTTP CfBackend that ships the rendered (sql, params) to the Cloudflare D1 REST API with params as a STRUCTURED bound array (never interpolated — the injection-safety guarantee, an HTTP-backend obligation), and the D1 /batch endpoint maps one commit_transaction to one atomic transaction. KV (/cf/kv/<ns>/<key>) is the blob/namespace archetype (ls/cp/mv/rm + a degenerate key/value table for SELECT/UPSERT, TTL + metadata). Queues (/cf/queue/<name>) is the append/log archetype (INSERT appends with an idempotency key, SELECT tails the consumer pull). Capabilities gate verbs per node at parse time with a structured error (UPDATE on a queue, a write over KV namespace). The Cloudflare API token is a qfs_secrets::Secret written into a redacted Authorization header — never logged, never in a CfError. Owned DTOs only at the CfBackend seam — no worker::*/SDK type leaks; reqwest stays confined in qfs-driver-http (this crate rides its HttpClient seam). The wasm Workers-binding backend is named-parked behind the same seam. Bridges its synchronous PlanApplier to the runtime async ApplyDriver via qfs-runtime's PlanApplierBridge (a runtime leaf)."

[dependencies]
# The introspective Driver contract (t13): trait, archetype/capability/pushdown DTOs,
# the shared CfsError, and the Path boundary adapter.
qfs-driver = { path = "../driver" }
# The effect substrate (t06/t09): EffectKind/EffectNode/Target/VfsPath + the synchronous
# PlanApplier seam the runtime bridge drives.
qfs-plan = { path = "../plan" }
# The canonical typed row model + Schema/Predicate/Value/DriverId (t05) the describe schema,
# the compiled D1 query, the KV/queue rows, and the bound params speak.
qfs-types = { path = "../types" }
# The async interpreter side: the ApplyDriver/DriverRegistry the bridge registers into and
# the PlanApplierBridge that adapts this driver's synchronous applier. tokio is confined to
# qfs-runtime + leaf driver-impl consumers (this crate), so qfs-plan's purity dep-closure
# test stays green.
qfs-runtime = { path = "../runtime" }
# REUSE THE t17 SQL EMITTER (the headline reuse): D1 is SQLite-over-HTTP, so it shares the
# Dialect::Sqlite emitter (render_select/render_dml), the pure query compiler (compile +
# QuerySpec), and the owned catalog DTOs (Catalog/TableCatalog/ColumnDef/RelationKind). The
# injection-safe parameterized SQL is rendered ONCE in the pure-leaf qfs-sql-core (extracted
# from t17 so BOTH driver crates reuse one emitter), NOT re-derived here. Depending on the pure
# leaf (over qfs-types only) — rather than on qfs-driver-sql (a runtime leaf) — keeps each
# driver an INDEPENDENT runtime leaf, so tokio dead-ends in each (the dep_direction runtime-leaf
# confinement test enforces it: a runtime consumer must not be depended upon by another crate).
qfs-sql-core = { path = "../sql-core" }
# The shared pure HTTP DTO + redaction leaf (t19): HttpRequest/HttpResponse + the single
# SENSITIVE_HEADERS authority that redacts the Authorization bearer in every log. This crate
# trades only in these owned DTOs over a LOCAL HttpExchange seam (the qfs-google-auth precedent)
# — it does NOT depend on qfs-driver-http (a runtime leaf), so reqwest stays confined there and
# this crate stays an independent runtime leaf. The binary wires a concrete HttpClient adapter.
qfs-http-core = { path = "../http-core" }
# The single secrets surface (t27): the Cloudflare API token is a qfs_secrets::Secret fetched
# by CredentialKey (driver "cf", account <db|account>), never logged, never in an error.
qfs-secrets = { path = "../secrets" }
# Owned DTOs (de)serialize from the Cloudflare JSON; the D1 params bind as a structured JSON
# array; no worker/SDK type ever crosses the boundary.
serde = { workspace = true }
serde_json = { workspace = true }
# Structured, secret-free CfError taxonomy (RFD §5, AI-consumable).
thiserror = { workspace = true }
# Structured request/lifecycle logging at debug, with the bearer token redacted (the
# HttpRequest Debug redacts the Authorization header).
tracing = { workspace = true }

[dev-dependencies]
# End-to-end COMMIT tests drive the async interpreter through the bridge against an in-memory
# MockCfBackend (scripted Cloudflare responses + recorded requests) and an InMemoryStore — no
# live Cloudflare, no network.
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
serde_json = { workspace = true }

[lints]
workspace = true
