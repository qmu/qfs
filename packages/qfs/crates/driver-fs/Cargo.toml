[package]
name = "qfs-driver-fs"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs first-class filesystem driver (t68, RFD-0001 §5): the real host filesystem as a BlobNamespace mounted at /fs, addressed under operator-configured NAMED roots (an allowlist) rather than the fixed /local sandbox. Implements the t13 Driver contract (describe/capabilities/pushdown/applier) with hard `..`/absolute/symlink escape rejection re-validated at BOTH scan and apply time, deterministic glob scan, streaming reads, atomic temp-file+rename writes, copy->verify->[delete] for move, and an irreversible REMOVE. Bridges its synchronous PlanApplier to the runtime async ApplyDriver via qfs-runtime's PlanApplierBridge. Deny-all by default: with no root configured nothing resolves."

[dependencies]
# The introspective Driver contract (t13): trait, archetype/capability/pushdown DTOs,
# the shared CfsError, and the Path boundary adapter.
qfs-driver = { path = "../driver" }
# The effect substrate (t06/t09): EffectKind/EffectNode/Target/VfsPath + the synchronous
# PlanApplier seam the runtime bridge drives.
qfs-plan = { path = "../plan" }
# The canonical typed row model + Schema/DriverId (t05) the describe schema + scan rows speak.
qfs-types = { path = "../types" }
# The async interpreter side: the ApplyDriver/DriverRegistry the bridge registers into and the
# PlanApplierBridge that adapts this driver's synchronous applier. tokio is confined to
# qfs-runtime + here (a leaf consumer), so qfs-plan's purity dep-closure test stays green.
qfs-runtime = { path = "../runtime" }
# Async blocking-thread offload for the bridged apply leg + a multi-thread test runtime.
tokio = { workspace = true }
# Structured driver errors (RFD §5, AI-consumable).
thiserror = { workspace = true }

[dev-dependencies]
# Temp-dir fixtures: EVERY test runs against a tempdir and NEVER touches the user's files.
tempfile = "3"
# End-to-end COMMIT tests drive the async interpreter through #[tokio::test].
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true
