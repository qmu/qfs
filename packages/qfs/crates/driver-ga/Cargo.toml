[package]
name = "qfs-driver-ga"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs Google Analytics 4 driver (RFD-0001 §5, E4 t41): a READ-ONLY relational Driver exposing GA4 as queryable relations under /ga/<propertyId>. GA4's Data API (properties.runReport / runRealtimeReport) is a query surface — metrics grouped by dimensions over a date range with filters, aggregated server-side — so it maps onto the RelationalTable archetype with one honest constraint: GA is a query SOURCE, never a mutate target (no INSERT/UPSERT/UPDATE/REMOVE; write verbs are rejected structurally at the capability gate AND at the applier). Implements the t13 Driver contract (describe/capabilities/procedures/pushdown/applier) over the t19 GoogleApiClient (bearer injection + refresh-on-401, multi-account TokenSource) through a local HttpExchange adapter over qfs_http_core DTOs. A pure query->RunReportRequest compiler maps SELECT dims/metrics to dimensions[]/metrics[], a mandatory date predicate to dateRanges[], WHERE dimension/metric predicates to dimensionFilter/metricFilter, ORDER BY to orderBys[], LIMIT to limit — pushing WHERE with a TRUTHFUL residual (an exact GA filter drops the predicate; a loose pre-filter keeps it). DESCRIBE returns the property's dimension+metric catalog from properties.getMetadata. Owned DTOs only — no google-analytics SDK; the GaClient seam mocks in tests so no live GA network is touched. Tokens are qfs_secrets::Secret behind the auth base; never logged, never in errors. Bridges its (reject-all-writes) synchronous PlanApplier to the runtime async ApplyDriver via qfs-runtime's PlanApplierBridge (a runtime leaf)."

[features]
# Exposes test-only DTO constructors so a downstream consumer can fabricate the otherwise
# `#[non_exhaustive]` DTOs to seed the public `MockGaClient` in their own integration tests.
test-util = []

[dependencies]
# The introspective Driver contract (t13): trait, archetype/capability/pushdown DTOs,
# the shared CfsError, and the Path boundary adapter.
qfs-driver = { path = "../driver" }
# The effect substrate (t06/t09): EffectKind/EffectNode/Target/VfsPath + the synchronous
# PlanApplier seam the runtime bridge drives.
qfs-plan = { path = "../plan" }
# The canonical typed row model + Schema/DriverId (t05) the describe schema and the
# decoded report rows speak.
qfs-types = { path = "../types" }
# The async interpreter side: the ApplyDriver/DriverRegistry the bridge registers into and
# the PlanApplierBridge that adapts this driver's synchronous applier. tokio is confined to
# qfs-runtime + leaf driver-impl consumers (this crate), so qfs-plan's purity dep-closure
# test stays green.
qfs-runtime = { path = "../runtime" }
# The shared Google OAuth2 + multi-account auth base (t19): the GoogleApiClient (bearer
# injection + refresh-on-401), the per-account TokenSource, and the local HttpExchange seam.
qfs-google-auth = { path = "../google-auth" }
# The shared pure HTTP DTO + redaction leaf: HttpRequest/HttpResponse the GoogleApiClient
# sends, with the single SENSITIVE_HEADERS redaction authority.
qfs-http-core = { path = "../http-core" }
# Owned DTOs (de)serialize from the GA4 JSON; no google SDK type ever crosses the boundary.
serde = { workspace = true }
serde_json = { workspace = true }
# Structured, secret-free GaError taxonomy (RFD §5, AI-consumable).
thiserror = { workspace = true }
# Structured request/lifecycle logging at debug, with token values redacted by the
# HttpRequest Debug.
tracing = { workspace = true }

[dev-dependencies]
# Tests drive the synchronous machinery + the async bridge against an in-memory mock
# GaClient (scripted GA4 JSON + recorded requests) — no live GA, no network. End-to-end
# COMMIT tests drive the async interpreter through #[tokio::test].
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
serde_json = { workspace = true }

[lints]
workspace = true
