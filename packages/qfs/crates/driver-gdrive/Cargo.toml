[package]
name = "qfs-driver-gdrive"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs Google Drive driver (RFD-0001 §5, E4 t21): the blob/namespace Driver subsuming the legacy Go gdrive-ftp as one mount at /drive under the uniform VFS + pipe-SQL DSL. Maps Drive onto the BlobNamespace archetype (folders = directories, files = blobs) over My Drive (/drive/my) and Shared Drives (/drive/shared/<driveName>). Implements the t13 Driver contract (describe/capabilities/procedures/pushdown/applier) over the t19 GoogleApiClient (bearer injection + refresh-on-401, multi-account TokenSource) through a local HttpExchange adapter over qfs_http_core DTOs. SELECT/LS lists folder children and searches; pushes WHERE/LIMIT to Drive's q= search with a TRUTHFUL residual (loose Drive `contains`/`name=` pre-filters keep the exact SQL predicate as residual); UPSERT uploads/updates a file by resolved id; REMOVE trashes (never permanent delete unless an explicit hard-delete flag); UPDATE renames/moves; download content is decoded via qfs_codec; Google-native docs export to office MIME types. Owned DTOs only — no google-drive SDK; the GDriveClient seam mocks in tests so no live Drive network is touched. Tokens are qfs_secrets::Secret behind the auth base; never logged, never in errors. Bridges its synchronous PlanApplier to the runtime async ApplyDriver via qfs-runtime's PlanApplierBridge (a runtime leaf)."

[features]
# Exposes test-only DTO constructors so a downstream consumer can fabricate the otherwise
# `#[non_exhaustive]` DTOs to seed the public `MockDriveClient` in their own integration tests.
test-util = []

[dependencies]
# The introspective Driver contract (t13): trait, archetype/capability/pushdown DTOs,
# the shared CfsError, and the Path boundary adapter.
qfs-driver = { path = "../driver" }
# The effect substrate (t06/t09): EffectKind/EffectNode/Target/VfsPath + the synchronous
# PlanApplier seam the runtime bridge drives.
qfs-plan = { path = "../plan" }
# The canonical typed row model + Schema/DriverId (t05) the describe schema and the
# decoded file rows speak.
qfs-types = { path = "../types" }
# The pure bytes <-> rows codec contract (t15): a downloaded file body becomes a relation via
# a registered Codec on the read path.
qfs-codec = { path = "../codec" }
# The async interpreter side: the ApplyDriver/DriverRegistry the bridge registers into and
# the PlanApplierBridge that adapts this driver's synchronous applier. tokio is confined to
# qfs-runtime + leaf driver-impl consumers (this crate), so qfs-plan's purity dep-closure
# test stays green.
qfs-runtime = { path = "../runtime" }
# The shared Google OAuth2 + multi-account auth base (t19): the GoogleApiClient (bearer
# injection + refresh-on-401), the per-account TokenSource, and the local HttpExchange seam.
qfs-google-auth = { path = "../google-auth" }
# The shared pure HTTP DTO + redaction leaf: HttpRequest/HttpResponse the GoogleApiClient
# sends, with the single SENSITIVE_HEADERS redaction authority.
qfs-http-core = { path = "../http-core" }
# Owned DTOs (de)serialize from the Drive JSON; no google SDK type ever crosses the boundary.
serde = { workspace = true }
serde_json = { workspace = true }
# Structured, secret-free DriveError taxonomy (RFD §5, AI-consumable).
thiserror = { workspace = true }
# Structured request/lifecycle logging at debug, with token values redacted by the
# HttpRequest Debug.
tracing = { workspace = true }

[dev-dependencies]
# Tests drive the synchronous machinery + the async bridge against an in-memory mock
# GDriveClient (scripted Drive JSON + recorded requests) and an InMemoryStore — no live
# Drive, no network. End-to-end COMMIT tests drive the async interpreter through #[tokio::test].
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
serde_json = { workspace = true }

[lints]
workspace = true
