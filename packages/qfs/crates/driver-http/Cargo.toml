[package]
name = "qfs-driver-http"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs generic HTTP / REST driver (RFD-0001 §5, t18): the escape-hatch Driver mounted at /rest/<api>/... that maps the universal verbs (SELECT->GET, INSERT->POST, UPSERT->PUT, REMOVE->DELETE) onto HTTP methods internally, plus the http.get table-valued function. Config-driven (base URL, auth-via-secrets, headers, pagination); response bytes decode to rows through the t15 codec registry. The reusable REST request/response seam (HttpRequest/HttpResponse/HttpClient) is the base t24 GitHub + t25 Slack layer on. Bridges its synchronous PlanApplier to the runtime async ApplyDriver via qfs-runtime's PlanApplierBridge; the reqwest HTTP client is CONFINED to this leaf crate."

[dependencies]
# The introspective Driver contract (t13): trait, archetype/capability/pushdown DTOs,
# the shared CfsError, and the Path boundary adapter.
qfs-driver = { path = "../driver" }
# The effect substrate (t06/t09): EffectKind/EffectNode/Target/VfsPath + the synchronous
# PlanApplier seam the runtime bridge drives.
qfs-plan = { path = "../plan" }
# The canonical typed row model + Schema/DriverId (t05) the describe schema and the
# decoded response rows speak.
qfs-types = { path = "../types" }
# The pure bytes <-> rows codec contract (t15): a REST response body becomes a relation via
# a registered Codec (default json). This driver holds NO format-specific code.
qfs-codec = { path = "../codec" }
# The async interpreter side: the ApplyDriver/DriverRegistry the bridge registers into and
# the PlanApplierBridge that adapts this driver's synchronous applier. tokio is confined to
# qfs-runtime + leaf driver-impl consumers (this crate), so qfs-plan's purity dep-closure
# test stays green.
qfs-runtime = { path = "../runtime" }
# The credential / secret store (t27): auth headers are resolved from a `Secret` at commit
# time via the `Secrets` trait; raw tokens never enter config structs, Debug, or logs.
qfs-secrets = { path = "../secrets" }
# The shared pure HTTP DTO + redaction leaf (t19 refinement): the single source of truth for
# HttpMethod/HttpRequest/HttpResponse and the SENSITIVE_HEADERS redaction set. This crate keeps
# its HttpClient trait + reqwest impl local; only the DTOs + redaction live in qfs-http-core, so
# the GitHub (t24)/Slack (t25) layers and qfs-google-auth share ONE redaction authority.
qfs-http-core = { path = "../http-core" }
# Owned config DTOs (RestApiConfig/AuthStrategy/Pagination) deserialize from the qfs config.
serde = { workspace = true }
serde_json = { workspace = true }
# Structured driver errors (RFD §5, AI-consumable).
thiserror = { workspace = true }
# Structured, redacted request logging (URL + status, never auth headers/tokens).
tracing = { workspace = true }
# The real HTTP client, CONFINED here. The async client is driven on a dedicated
# current-thread runtime the applier owns, so the synchronous PlanApplier seam stays
# synchronous (the bridge offloads it to a tokio blocking thread) and no runtime is dropped in
# an async context. rustls so no system OpenSSL dependency is required.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
# The owned current-thread runtime the ReqwestClient drives each request on. tokio is confined
# to qfs-runtime + leaf driver-impl consumers (this crate), so the spine purity test stays green.
tokio = { workspace = true, features = ["rt", "macros"] }

[dev-dependencies]
# A tiny LOCAL loopback HTTP server (127.0.0.1) for the end-to-end wire test that drives the
# real reqwest client — NO live network: the server is stood up in-process and bound to an
# ephemeral localhost port.
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "io-util"] }
# End-to-end COMMIT tests drive the async interpreter through #[tokio::test].
qfs-codec = { path = "../codec" }

[lints]
workspace = true
