[package]
name = "qfs-driver-local"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs local-filesystem driver (RFD-0001 §5, first concrete Driver): a blob/namespace driver over the host filesystem, mounted at /local. Implements the t13 Driver contract (describe/capabilities/pushdown/applier) with a least-privilege sandbox root, deterministic glob scan, streaming reads, and atomic temp-file+rename writes; copy/move follow copy->verify->[delete]. Composes with the t15 codec registry so a local .md/.json blob is a queryable relation. Bridges its synchronous PlanApplier to the runtime async ApplyDriver via qfs-runtime's PlanApplierBridge."

[dependencies]
# The introspective Driver contract (t13): trait, archetype/capability/pushdown DTOs,
# the shared CfsError, and the Path boundary adapter.
qfs-driver = { path = "../driver" }
# The effect substrate (t06/t09): EffectKind/EffectNode/Target/VfsPath + the synchronous
# PlanApplier seam the runtime bridge drives.
qfs-plan = { path = "../plan" }
# The canonical typed row model + Schema/DriverId (t05) the describe schema and the
# decoded blob rows speak.
qfs-types = { path = "../types" }
# The pure bytes <-> rows codec contract (t15): a local blob becomes a relation via a
# registered Codec. This driver holds NO format-specific code — it owns only bytes I/O.
qfs-codec = { path = "../codec" }
# The async interpreter side: the ApplyDriver/DriverRegistry the bridge registers into and
# the PlanApplierBridge that adapts this driver's synchronous applier. tokio is confined to
# qfs-runtime + here (a leaf consumer), so qfs-plan's purity dep-closure test stays green.
qfs-runtime = { path = "../runtime" }
# Async blocking-thread offload for the bridged apply leg + a multi-thread test runtime.
tokio = { workspace = true }
# Structured driver errors (RFD §5, AI-consumable).
thiserror = { workspace = true }

[dev-dependencies]
# Temp-dir fixtures: every test runs against a tempdir and NEVER touches the user's files.
tempfile = "3"
# End-to-end COMMIT tests drive the async interpreter through #[tokio::test].
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
# The e2e test loads the builtin codecs to decode a local blob into rows.
qfs-codec = { path = "../codec" }

[lints]
workspace = true
