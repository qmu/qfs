[package]
name = "qfs-driver-markdown"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs /markdown collection-path driver (the strategy plan's マークダウン収集パス, minimal slice): a declared tree of .md files resolved as two relational tables — /markdown/<name>/documents (one row per file: root-relative path, title, frontmatter) and /markdown/<name>/links (one row per inline markdown link, carrying the FULL nested heading path of the section it was written under as a lossless JSON array — the column the later closed-relation-vocabulary mission types; this slice ships NO relation-type column, by construction). READ-ONLY: SELECT on both tables, every write rejected at the parse-time capability gate; the applier slot is a NoopApplier, so the crate carries NO qfs-runtime dep and stays a pure, wasm-buildable introspective + parser crate mirroring qfs-driver-directory. The introspective half (mount/describe/capabilities/pushdown) is PURE — static, credential-free schemas with NO filesystem root bound; the impure tree walk lives in the qfs binary leaf, which feeds file text into this crate's pure parser."

[dependencies]
# The introspective Driver contract (t13): trait, archetype/capability/pushdown DTOs, the shared
# CfsError, and the Path boundary adapter.
qfs-driver = { path = "../driver" }
# The effect substrate: the synchronous PlanApplier seam. READ-ONLY means this driver ships only
# a NoopApplier (like /sys and /directories) — no live write leg — so it carries NO qfs-runtime
# dep and stays a pure, wasm-buildable crate.
qfs-plan = { path = "../plan" }
# The canonical typed row model + Schema/Column/Value/RowBatch (t05) the describe schema and the
# scanned document/link rows speak.
qfs-types = { path = "../types" }
# Frontmatter: the YAML block parses into ONE serde_json::Value carried as the `frontmatter`
# Json column. serde_yaml_ng is the workspace's YAML choice (the maintained fork the codec
# crate already uses — see codec/Cargo.toml for the exit note).
serde_json = { workspace = true }
serde_yaml_ng = "0.10"

[lints]
workspace = true
