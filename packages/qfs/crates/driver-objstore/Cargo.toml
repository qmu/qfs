[package]
name = "qfs-driver-objstore"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs object-storage driver (RFD-0001 §5, E4 t22): the blob/namespace archetype over S3-compatible object storage, two Driver mounts — /s3/<bucket>/<key> (AWS S3) and /r2/<bucket>/<key> (Cloudflare R2) — sharing ONE S3-compatible HTTP core (a self-contained SigV4 v4 request signer + a thin async client, NO vendor SDK per RFD §9). Native verbs ls/cp/mv/rm + universal UPSERT/REMOVE/get (streaming download). Streaming bodies both directions behind a bounded-memory ByteStream (single PUT below ~8 MiB, multipart above with abort-on-error — no orphan-part billing). @versionId addressing (/s3/<bucket>/<key>@<versionId>) for GET/REMOVE on versioned buckets; ETag surfaced for optimistic concurrency. Capabilities gate verbs per node at parse time with a structured error. Truthful pushdown with residual (the t20 lesson): an ls pushes a key prefix/delimiter down, a GET pushes a byte range down, and a predicate only partially expressible as a prefix/range is KEPT as a residual the engine re-filters — never silently dropped (never wrong rows). The SigV4 signer + any http::/SigV4-internal type stay inside the private sigv4 module; only owned DTOs (ObjectMeta/ListPage/PutResult) and a ByteStream cross the public API — no vendor type leaks (RFD §9). Credentials are a qfs_secrets::Secret exposed only inside the signer; the Authorization header is redacted by the shared qfs-http-core authority — never logged, never in an ObjError. The wasm R2 native binding (worker::Bucket) is gated #[cfg(target_arch = wasm32)] only so the native build never links it; Backend::Http is reused for native R2. The copy→verify→delete leg primitives are exposed for the runtime's cross-source cp/mv (not orchestrated here). Bridges its synchronous PlanApplier to the runtime async ApplyDriver via qfs-runtime's PlanApplierBridge (a runtime leaf)."

[dependencies]
# The introspective Driver contract (t13): trait, archetype/capability/pushdown DTOs,
# the shared CfsError, and the Path boundary adapter.
qfs-driver = { path = "../driver" }
# The effect substrate (t06/t09): EffectKind/EffectNode/Target/VfsPath + the synchronous
# PlanApplier seam the runtime bridge drives.
qfs-plan = { path = "../plan" }
# The canonical typed row model + Schema/Predicate/Value/DriverId (t05) the describe schema,
# the ObjectMeta listing rows, and the residual predicate speak.
qfs-types = { path = "../types" }
# The async interpreter side: the ApplyDriver/DriverRegistry the bridge registers into and
# the PlanApplierBridge that adapts this driver's synchronous applier. tokio dead-ends in this
# leaf so qfs-plan's purity dep-closure test stays green.
qfs-runtime = { path = "../runtime" }
# The shared pure HTTP DTO + redaction leaf (t19): HttpRequest/HttpResponse + the single
# SENSITIVE_HEADERS authority that redacts the SigV4 Authorization header in every log. This
# crate trades only in these owned DTOs over a LOCAL HttpExchange seam (the qfs-google-auth /
# qfs-driver-cf precedent) — it does NOT depend on qfs-driver-http (a runtime leaf), so reqwest
# stays confined there and this crate stays an independent runtime leaf.
qfs-http-core = { path = "../http-core" }
# The single secrets surface (t27): the AWS/R2 secret-access-key (+ optional session token) is
# a qfs_secrets::Secret exposed only inside the SigV4 signer, never logged, never in an error.
qfs-secrets = { path = "../secrets" }
# The shared pure crypto leaf (t34): SHA-256 (FIPS 180-4) + HMAC-SHA256 the SigV4 signer derives
# keys / hashes canonical material with. A TRUE pure leaf (zero deps, std-only), so depending on
# it adds no runtime/native coupling and keeps the wasm build clean. Replaces this crate's former
# private src/sha256.rs copy — one source for the three former vendorings.
qfs-crypto-core = { path = "../crypto-core" }
# Owned DTOs (de)serialize for the ls/DESCRIBE rows; no vendor type ever crosses the boundary.
serde = { workspace = true }
serde_json = { workspace = true }
# Structured, secret-free ObjError taxonomy (RFD §5, AI-consumable).
thiserror = { workspace = true }
# Structured request/lifecycle logging at debug, with the SigV4 Authorization header redacted
# (the HttpRequest Debug redacts the Authorization header).
tracing = { workspace = true }

# The native R2 Workers binding (worker::Bucket) is wasm-only: under wasm32, Backend::R2Binding
# can be served by the native binding instead of HTTP. It is a target-gated dependency so the
# NATIVE build never links it (RFD §8 deployment mapping). Parked behind the ObjectBackend seam
# until a live wasm Workers CI lane exists; the gated code type-checks by inspection and the
# native + wasm builds both compile.
# [target.'cfg(target_arch = "wasm32")'.dependencies]
# worker = "0.x"   # parked — see src/backend.rs R2BindingBackend (no live wasm Workers lane yet)

[dev-dependencies]
# End-to-end COMMIT tests drive the async interpreter through the bridge against an in-memory
# MockObjectBackend (scripted S3 responses + recorded requests) — no live S3/R2, no network.
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
serde_json = { workspace = true }

[lints]
workspace = true
