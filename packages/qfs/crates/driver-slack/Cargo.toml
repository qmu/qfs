[package]
name = "qfs-driver-slack"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs Slack driver (RFD-0001 §5, E4 t25): the Append/log archetype crossed with an object-graph, mounted at /slack/<ws>/... over the Slack Web API. Multi-archetype per-node: messages/replies/reactions/dms = Append/log, files = Blob/namespace (ls/cp/rm), users = Relational (read-mostly) — each a typed Schema powering DESCRIBE. Implements the t13 Driver contract (describe/capabilities/procedures/pushdown/applier) and reuses the t18/t24 reusable-HTTP-seam shape through a local HttpTransport seam over the shared qfs_http_core HTTP DTOs + the single SENSITIVE_HEADERS redaction authority (no hand-rolled HTTP DTO; no crate-dep on qfs-driver-http so this stays a runtime leaf): Bearer (bot-token) injection, cursor pagination, 429/Retry-After bounded retry on idempotent GETs only. Carries the t18 BodyErrorRule: Slack returns HTTP 200 with {ok:false,error:...}; the seam maps that to a structured TERMINAL error (opt-in on the config; Slack turns it on). Universal CRUD maps onto the Web API: SELECT→conversations.history/replies/users.list, INSERT(message)→chat.postMessage, INSERT(reply)→chat.postMessage(thread_ts=), INSERT(reaction)→reactions.add, REMOVE(reaction)→reactions.remove, REMOVE(message)→chat.delete, files cp→files.upload / rm→files.delete / ls→files.list. Procedures via CALL slack.react/pin/unpin/update/delete; pin/delete are irreversible. A pure POST prelude alias desugars to message INSERT. chat.postMessage is NOT idempotent — a client_msg_id idempotency key is attached, the at-least-once risk surfaced in PREVIEW, and an ambiguous post is never auto-retried; reactions.add is naturally idempotent (already-reacted is swallowed). The genuinely-hard, genuinely-wasm-required part is parse_event (pure, no I/O): the Slack Events-API envelope → owned SlackEvent/SlackInbound, verifying X-Slack-Signature = HMAC-SHA256 over v0:timestamp:body with a CONSTANT-TIME compare + timestamp-skew rejection (replay defense), handling the url_verification challenge, surfacing event_id for dedupe, and normalizing message/reaction_added/app_mention/file_shared. The pure parse_event + introspection subset has ZERO qfs-runtime/tokio dependency (qfs-runtime is an optional default-on feature) so `--no-default-features --features events` compiles for wasm32-unknown-unknown. The HMAC-SHA256/SHA-256 is the dependency-free, wasm-safe primitive (no native crypto crate that breaks wasm). The bot token + signing secret are qfs_secrets::Secret resolved only at commit/verify time, never in config Debug, logs, or errors (planted-canary test). Owned DTOs only — no Slack SDK, no Slack JSON crosses the boundary. Tests use mocks/fakes/fixtures/golden — NO live Slack API, NO live token (live E2E parked for t38)."

[features]
default = ["runtime"]
# The async-bridge side: gating qfs-runtime behind a default-on feature lets the PURE subset
# (parse_event + the introspective Driver surface + HMAC) build for wasm32-unknown-unknown with
# `--no-default-features --features events`, where tokio/rt-multi-thread cannot link.
runtime = ["dep:qfs-runtime"]
# A documentation marker for the pure event-parsing + introspection subset (the wasm32 build
# target — Workers WEBHOOK ingress, RFD §8). NOTE (Architect carry-over): this feature is a no-op
# *enabler* — it adds no code. The REAL fence excluding the runtime bridge is the **absence of the
# `runtime` feature** (qfs-runtime is `optional`), so the load-bearing wasm invocation is
# `--no-default-features [--features events]`. `events` exists only so a downstream wasm consumer
# can name an intent-revealing feature; the dep-closure proof is the absence of `runtime`, not the
# presence of `events`.
events = []
# Exposes test-only DTO constructors so a downstream consumer can fabricate the otherwise
# `#[non_exhaustive]` DTOs in their own integration tests.
test-util = []

[dependencies]
# The introspective Driver contract (t13): trait, archetype/capability/pushdown DTOs,
# the shared CfsError, and the Path boundary adapter.
qfs-driver = { path = "../driver" }
# The effect substrate (t06/t09): EffectKind/EffectNode/Target/VfsPath + the synchronous
# PlanApplier seam the runtime bridge drives.
qfs-plan = { path = "../plan" }
# The canonical typed row model + Schema/Predicate/Value/DriverId (t05) the describe schema,
# the decoded Slack rows, and the residual predicate speak.
qfs-types = { path = "../types" }
# The async interpreter side: the ApplyDriver/DriverRegistry the bridge registers into and the
# PlanApplierBridge that adapts this driver's synchronous applier. tokio dead-ends in this leaf
# so qfs-plan's purity dep-closure test stays green. OPTIONAL + default-on so the pure subset
# (parse_event + introspection) builds for wasm32-unknown-unknown without pulling tokio.
qfs-runtime = { path = "../runtime", optional = true }
# The single secrets surface (t27): the bot token + signing secret are qfs_secrets::Secrets,
# resolved only at commit/verify time, never in a DTO, Debug, error, or log.
qfs-secrets = { path = "../secrets" }
# The shared pure crypto leaf (t34): SHA-256 + HMAC-SHA256 + constant_time_eq that parse_event
# verifies X-Slack-Signature with (re-exported as `qfs_driver_slack::hmac`). A TRUE pure leaf
# (zero deps, std-only) so it adds no runtime/native coupling and stays wasm-clean for the Workers
# WEBHOOK ingress — replacing this crate's former private src/hmac.rs copy.
qfs-crypto-core = { path = "../crypto-core" }
# The shared pure HTTP DTO + redaction leaf (t19): the single source of truth for
# HttpMethod/HttpRequest/HttpResponse and the SENSITIVE_HEADERS redaction set. This driver trades
# ONLY in these DTOs across the local HttpTransport seam — no hand-rolled HTTP DTO (the t19
# redaction-drift token leak stays closed). It does NOT depend on qfs-driver-http: a qfs-runtime
# consumer must stay a leaf (the dep-direction confinement test), so the Slack transport seam is a
# local structural twin of t18's HttpClient over the SAME http-core DTOs.
qfs-http-core = { path = "../http-core" }
# Owned DTOs (de)serialize from the Slack JSON; no Slack SDK/vendor type ever crosses the boundary.
serde = { workspace = true }
serde_json = { workspace = true }
# Structured, secret-free SlackError taxonomy (RFD §5, AI-consumable).
thiserror = { workspace = true }
# Structured request/lifecycle logging at debug, with token values redacted by the HttpRequest Debug.
tracing = { workspace = true }

[dev-dependencies]
# Tests drive the synchronous machinery + the async bridge against an in-memory mock SlackClient
# (scripted Slack JSON + recorded requests) and an InMemoryStore — no live Slack, no network.
# End-to-end COMMIT tests drive the async interpreter through #[tokio::test].
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
serde_json = { workspace = true }

[lints]
workspace = true
