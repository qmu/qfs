[package]
name = "qfs-driver-sys"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs /sys administration driver (RFD-0001 §5; roadmap §3.4 / M3, t53): the deployment's OWN state — /sys/users, /sys/projects, /sys/audit, /sys/connections, /sys/policies — exposed as ordinary qfs paths backed by the System DB (t42). Administration is also everything-is-a-path: a super-admin reads /sys/audit, /sys/users, … as relations and (gated) `INSERT INTO /sys/policies` from the CLI, MCP, or dashboard — one engine, three faces. The introspective half (mount/describe/capabilities/pushdown/plan_write) is PURE — a stable, credential-free schema with NO DB and NO secrets, mirroring the /server self-config driver's NoopApplier split. The System-DB read source + the rusqlite-backed, transactional applier are INJECTED from the qfs binary leaf through the vendor-free SysBackend seam (exactly like the SQL driver's SqlBackend), so this crate stays tokio-free and DB-free. /sys/connections projects connection names/metadata ONLY — never secret material (the vault is never read here). /sys/audit is append-only (SELECT only — no UPDATE/REMOVE); every /sys mutation appends an audit row, so administration observes itself. Bridges its synchronous PlanApplier to the runtime async ApplyDriver via qfs-runtime's PlanApplierBridge (a runtime leaf)."

[dependencies]
# The introspective Driver contract (t13): trait, archetype/capability/pushdown DTOs,
# the shared CfsError, and the Path boundary adapter.
qfs-driver = { path = "../driver" }
# The effect substrate (t06/t09): EffectKind/EffectNode/Target/VfsPath + the synchronous
# PlanApplier seam the runtime bridge drives.
qfs-plan = { path = "../plan" }
# The canonical typed row model + Schema/Column/Value/DriverId (t05) the describe schema,
# the scanned rows, and the policy-write payload speak.
qfs-types = { path = "../types" }
# The async interpreter side: the SharedApplier/EffectError/EffectOutput the runtime bridge
# adapts this driver's synchronous applier into, and the PlanApplierBridge itself. tokio is
# confined to qfs-runtime + leaf driver-impl consumers (this crate), so the spine purity guard
# stays green — the rusqlite-backed SysBackend is INJECTED from the binary, not pulled here.
qfs-runtime = { path = "../runtime" }
# Structured, secret-free SysError taxonomy (RFD §5, AI-consumable).
thiserror = { workspace = true }

[lints]
workspace = true
