[package]
name = "qfs-engine"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs local combine engine (RFD-0001 §6, ticket t14): the in-house MiniEvaluator behind the CombineEngine seam that executes the cross-source residual a pushdown plan leaves local — filter, project, hash-join, set ops, group/aggregate, sort, limit, EXPAND. Dependency-light + wasm-friendly (the DuckDB-vs-own decision is ADR-0002); the heavy lifting is pushed down, so only a small relational subset runs here."

[dependencies]
# The PhysicalPlan / CombineOp the engine executes, and the typed Predicate it filters by.
qfs-pushdown = { path = "../pushdown" }
# The canonical Row/RowBatch/Value/Schema the engine computes over (RFD §4).
qfs-types = { path = "../types" }

[dev-dependencies]
qfs-types = { path = "../types" }
qfs-pushdown = { path = "../pushdown" }
qfs-driver = { path = "../driver" }
qfs-parser = { path = "../parser" }
serde_json = { workspace = true }

[lints]
workspace = true
