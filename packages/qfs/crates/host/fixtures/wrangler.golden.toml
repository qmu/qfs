# Generated by `qfs` (t36 host-workers). Binding NAMES only — never a token or
# secret (blueprint §8). Fill `id`/`database_id` and run `wrangler secret put`
# for each signing-secret handle below before deploying.
name = "qfs-deploy"
main = "qfs.wasm"
compatibility_date = "2024-01-01"

# ENDPOINT causes (served by the Worker `fetch` handler):
#   GET /events  (handler `events`)

[triggers]
crons = ["0 */6 * * *"]

[durable_objects]
bindings = [{ name = "WatchtowerState", class_name = "WatchtowerState" }]

# Watcher causes (durable cursor / LAST_RUN via the DO above):
#   trigger `notify` on `inbox`  (cursor key `watcher/notify/cursor`)

[[queues.producers]]
queue = "inbound-events"
binding = "INBOUND_QUEUE"

[[queues.consumers]]
queue = "inbound-events"

[[d1_databases]]
binding = "D1_ANALYTICS"
database_name = "analytics"
database_id = ""  # fill in: wrangler d1 list

[[r2_buckets]]
binding = "R2_BACKUPS"
bucket_name = "backups"

[[kv_namespaces]]
binding = "KV_SESSIONS"
id = ""  # fill in: wrangler kv:namespace list
