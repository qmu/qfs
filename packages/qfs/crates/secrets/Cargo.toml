[package]
name = "qfs-secrets"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs credential / secret store + multi-account resolution (RFD-0001 §10): the single secrets surface every driver and the server read from. Redacting Secret type (zeroized, never logged), pluggable Secrets backends, encrypted LocalStore, and the account-resolution precedence ladder."

[dependencies]
# The canonical owned DriverId (a LEAF in the spine — no token, no vendor handle).
# qfs-secrets depends ONLY on qfs-types among workspace crates so the spine stays
# acyclic (qfs-secrets -> qfs-types), and the consumer-side trait stays owned-DTO only.
qfs-types = { path = "../types" }
thiserror = { workspace = true }
# serde for the AccountRecord / ActiveAccounts plaintext metadata (NO secret material:
# `Secret` deliberately does NOT implement Serialize — see src/secret.rs).
serde = { workspace = true }
serde_json = { workspace = true }
# Zeroize the secret bytes on drop so key material does not linger in freed memory.
zeroize = { version = "1", features = ["alloc"] }
# Plaintext-metadata timestamps (AccountRecord.created_at). No secret material.
time = { version = "0.3", features = ["serde", "formatting", "parsing"] }

# Native-only crypto deps. Both the fs-bound `LocalStore` (legacy file vault) AND the t43
# `envelope` module (DEK wrap/unwrap + per-value seal/open) are `cfg(not(wasm32))`: the AEAD/KDF
# primitives are pure Rust, but `rand 0.10 -> getrandom 0.4` has no default `wasm32-unknown-unknown`
# backend (it requires the Workers artifact to select `wasm_js` via a RUSTFLAGS cfg). qfs-secrets is
# a documented WASM-BUILDABLE crate (the trait + DTOs + Secret + resolve compile on Workers, which
# use `WorkerStore` — they never need the envelope), so we KEEP that invariant by confining these to
# non-wasm targets, exactly as the file vault always has. The envelope is consumed only by the
# binary's native SQLite backend, so native builds are unaffected.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# AEAD: ChaCha20-Poly1305 encrypts each secret value (and wraps the data-key) at rest.
chacha20poly1305 = "0.10"
# Passphrase-derived key (argon2id) — derives the KEK that wraps the data-key.
argon2 = "0.5"
# CSPRNG for the data-key, the per-store KDF salt, and the per-value/per-wrap nonces.
rand = "0.10"

[dev-dependencies]
# Tempdirs for the LocalStore round-trip / 0600 / atomic-write tests — NO real
# credentials, NO real keychain, NO network ever touched in tests.
tempfile = "3"

[lints]
workspace = true
