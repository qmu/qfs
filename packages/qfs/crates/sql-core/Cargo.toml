[package]
name = "qfs-sql-core"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs pure-leaf SQL compile/emit core (RFD-0001 §5/§6, extracted from t17 for the t23 Cloudflare D1 reuse): the dialect-agnostic, injection-safe qfs-query -> parameterized-SQL machinery (Dialect quoting/placeholders/upsert, the SelectPlan/DmlOp emitter that binds EVERY value as a parameter, the pure query compiler with a truthful residual) and the owned catalog DTOs (Catalog/TableCatalog/ColumnDef). The single source of truth for the sqlite emitter both qfs-driver-sql (postgres/mysql/sqlite) and qfs-driver-cf (Cloudflare D1, SQLite-over-HTTP) reuse — so neither runtime-leaf driver depends on the other (the same single-source pattern as qfs-http-core). A pure leaf: its only workspace dependency is qfs-types; NO runtime/secrets/driver coupling. The SqlError lives here; the runtime/secrets From adapters live in the consuming driver crates."

[dependencies]
# The canonical typed row model + Schema/Predicate/Value/DriverId (t05) the catalog schema,
# the compiled query, and the bound params speak. The ONLY workspace dependency (pure leaf).
qfs-types = { path = "../types" }
# Render an irregular (Struct/Array/Json) DML value to JSON text so it binds as a single bound
# text parameter (still bound, never interpolated).
serde_json = { workspace = true }
# Structured, secret-free SqlError taxonomy (RFD §5, AI-consumable).
thiserror = { workspace = true }

[lints]
workspace = true
