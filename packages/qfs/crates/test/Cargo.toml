[package]
name = "qfs-test"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish = false
description = "qfs offline test harness (t38): the dev-only support crate that institutionalizes the trip's ad-hoc harness patterns — plan-shape assertions, fake backends + FakeWorld, a wasm-clean scripted MockHttp + NoCreds, parser/codec/handler goldens via canonical JSON, and a no-network guard + credential-shape scrub. Dev-dependency ONLY — never linked into the shipped `qfs` binary (proved by tests/dev_only_dep_graph.rs). PURE: the parse/plan/codec helpers build for wasm32-unknown-unknown (no std::net, no threads)."

[dependencies]
# The hub: Evaluator / EvalValue / Plan / EffectKind / commit / RecordingApplier / PlanApplier,
# the MountRegistry the plan assertion evaluates against, the codec registry + Codec trait, the
# server-DDL desugar (from_server_ddl/server_write_plan) the handler-PREVIEW fixture drives, and
# the canonical Row/Value/Schema model — all through the ONE qfs-core surface. qfs-core's closure
# is the tokio-free pure spine (qfs-plan's purity test forbids tokio there), so this harness stays
# wasm-clean through it.
qfs-core = { path = "../core" }
# The parser front door (parse_statement → Statement) the golden_parse helper snapshots.
qfs-parser = { path = "../parser" }
# The pure, wasm-clean HTTP DTOs (HttpMethod/HttpRequest/HttpResponse + the redacting Debug) the
# scripted MockHttp trades in. A PURE LEAF — no reqwest/tokio — so MockHttp stays wasm-clean (the
# concrete reqwest HttpClient stays in qfs-driver-http, never pulled here).
qfs-http-core = { path = "../http-core" }
# serde + serde_json power the canonical-JSON golden serialization (deterministic key + DAG-node
# ordering, secret-shape scrub). No I/O — pure transforms.
serde = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
