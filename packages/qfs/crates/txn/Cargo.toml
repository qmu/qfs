[package]
name = "qfs-txn"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs transactional correctness envelope (RFD-0001 §6/§10): pure orchestration over the effect plan. Deterministic idempotency keys (EffectKey), optimistic-concurrency preconditions (@version/ETag), single-source ACID vs cross-source saga commit strategy, an append-before-apply audit ledger, and the cp/mv copy->verify->delete recoverable triple. No async, no I/O, no vendor SDK types — the runtime drives the impure apply through the LegApplier seam."

[dependencies]
# Pure orchestration over the effect substrate: EffectKey/Precondition attach to plan
# nodes, CommitStrategy is chosen by inspecting the Targets a Plan touches. This crate is
# I/O-free (no tokio) so it stays low in the spine alongside qfs-plan; the runtime adapts
# its async ApplyDriver to the synchronous LegApplier seam defined here.
qfs-plan = { path = "../plan" }
# Canonical owned DriverId + the RowBatch the EffectKey hashes over.
qfs-types = { path = "../types" }
# Structured, machine-readable DTOs (LegOutcome / RecoveryReport / Version / Etag) for the
# `-json` projection, and the canonical-serialization carrier for the EffectKey hash.
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

[lints]
workspace = true
