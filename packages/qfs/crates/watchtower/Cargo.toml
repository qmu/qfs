[package]
name = "qfs-watchtower"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "qfs watchtower (t34, RFD-0001 §8): the 'cause' side of the server runtime that turns external change into fired effect-plans. Two cause sources — inbound WEBHOOKs (HMAC-verified ingress) and polling source WATCHERs (cursor-diff over the read path) — emit normalized owned `Event` DTOs onto an internal `EventBus`; registered TRIGGERs match an event, evaluate the optional `WHERE` over `NEW.*` (a pure predicate evaluator), bind `NEW.*` into the handler plan, lower to a Plan, pass the policy gate hook, and COMMIT through an INJECTED Committer (the qfs-cron pattern — qfs-watchtower never drives the COMMIT interpreter, so it stays off qfs-runtime). Delivery is AT-LEAST-ONCE: ack only after a successful COMMIT, a durable spool redelivers an un-acked event on crash, and a `dedup_key` carried end-to-end + an idempotency ledger make a re-delivered Event a no-op after its first net effect (idempotent handlers, RFD §6). Signing secrets are resolved BY HANDLE from qfs-secrets (t27), never inlined, never logged; the HMAC verify uses the shared pure qfs-crypto-core leaf with a constant-time compare. The PURE event/dispatch DTOs + predicate evaluator + dedup ledger have ZERO tokio (the LocalBus MPSC + watcher tasks are behind the default-on `native` feature, the t25/t33 pattern) and build for wasm32-unknown-unknown (the CF Queues/DO mapping). A LEAF: only the `qfs` binary consumes it (the serve composition root, the watchtower sibling of qfs-http/qfs-cron); its feature-gated tokio dead-ends in the terminal binary and it does NOT depend on qfs-runtime, so the qfs-exec-consumer + runtime-leaf confinement guards stay green. qfs-watchtower does NOT depend on qfs-http and serves no HTTP itself: its WebhookBinding exposes a pure ingest handler over owned request data that the BINARY composes into the qfs-http listener (option b), so neither leaf depends on the other."

[features]
default = ["native"]
# The native side. The PURE watchtower core (the owned Event/EventKind/dedup_key DTOs, the
# EventBus/WatcherStore/Committer/PolicyGate TRAITS, the pure WHERE predicate evaluator over
# NEW.*, the NEW.* plan binding, and the dedup idempotency ledger) depends ONLY on the tokio-free,
# wasm-clean spine crates (qfs-core/qfs-parser/qfs-pushdown/qfs-types/qfs-secrets/qfs-crypto-core),
# so it builds for wasm32-unknown-unknown with `--no-default-features`. `native` gates the things
# that CANNOT be wasm-clean and are composition wiring anyway: (1) qfs-exec (the read path's
# build_plan/execute_read — pulls tokio's full feature set), (2) qfs-server (the Binding/registry
# seam — pulls tokio signal/mio, no-wasm), and (3) tokio (the LocalBus MPSC + watcher tasks). The
# load-bearing wasm fence is the ABSENCE of `native` (these deps are `optional`), not any marker
# (the t25/t33 lesson). The binary always builds with `native` on, so the real LocalBus +
# WatchtowerBinding + watcher daemon are present in production.
native = ["dep:qfs-exec", "dep:qfs-server", "dep:tokio"]

[dependencies]
# The hub: Plan / commit / RecordingApplier, the owned Value/Row/Literal type model, the
# rehydratable PlanSpec/StatementSpec (the t31 canonical DO/WHERE body), and the Statement AST
# re-export. qfs-core's closure is the tokio-free pure spine, so the pure watchtower core stays
# wasm-clean through it.
qfs-core = { path = "../core" }
# The parser AST (Statement/Expr/Pipeline/PipeOp) the WHERE predicate is extracted from + the
# NEW.* plan binding walks. tokio-free.
qfs-parser = { path = "../parser" }
# The Expr -> typed Predicate lowering (`lower_predicate`) the pure WHERE evaluator runs over NEW.*.
qfs-pushdown = { path = "../pushdown" }
# The canonical typed row model (Predicate/Row/Value/Schema/Column) the Event payload and the
# WHERE evaluation speak.
qfs-types = { path = "../types" }
# The single secrets surface (t27): the webhook signing secret is a qfs_secrets::Secret resolved
# only at verify time BY HANDLE, never inlined in WebhookDef, never logged.
qfs-secrets = { path = "../secrets" }
# The shared pure crypto leaf (t34): HMAC-SHA256 + constant_time_eq verifying the inbound webhook
# signature. A TRUE pure leaf (zero deps, std-only), so it adds no runtime/native coupling and
# stays wasm-clean for the CF Workers WEBHOOK ingress.
qfs-crypto-core = { path = "../crypto-core" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
# The read executor (execute_read for watcher polling) + build_plan (lowering the handler DO body
# to a Plan). qfs-watchtower is a LEAF integration consumer of the executor, the same role
# qfs-cmd / qfs-http / qfs-cron play (the t29 CO-t29-4 allowlist is extended for qfs-watchtower).
# OPTIONAL behind `native`: it pulls tokio's full feature set (no-wasm).
qfs-exec = { path = "../exec", optional = true }
# The Binding/ServerState/TriggerDef/WebhookDef registry + reconcile seam the WatchtowerBinding
# converges to + the AuditSink. OPTIONAL behind `native`: qfs-server pulls tokio signal (mio,
# no-wasm), so the wasm core excludes it.
qfs-server = { path = "../server", optional = true }
# The native LocalBus MPSC + watcher tasks. tokio is used HERE for the event-bus/watcher domain
# only; qfs-watchtower does NOT depend on qfs-runtime (the real commit path is the injected
# Committer), so the runtime-leaf-confinement guard is untouched, and as a terminal-consumed leaf
# tokio dead-ends in the binary. OPTIONAL + default-on so the pure core builds for wasm32.
tokio = { version = "1", default-features = false, features = ["rt", "macros", "time", "sync"], optional = true }

[dev-dependencies]
# The in-memory fakes (counting committer, fake read driver) the tests drive — no live network/creds.
tokio = { version = "1", default-features = false, features = ["rt", "macros", "time", "sync"] }
# Black-box E2E (tests/e2e_watchtower.rs): drive the PUBLIC watchtower surface through the same
# crates the binary composes — qfs-server (ServerState/Runtime/AuditSink), qfs-core (Engine/Row/
# Value), qfs-exec (the read path a real Watcher::poll_once runs over an in-memory ReadDriver fake),
# qfs-pushdown (ScanNode), qfs-secrets (the fixture signing secret), and async-trait (the fake's
# ReadDriver impl). No live network, no live credentials.
qfs-server = { path = "../server" }
qfs-exec = { path = "../exec" }
qfs-pushdown = { path = "../pushdown" }
async-trait = { workspace = true }

[lints]
workspace = true
