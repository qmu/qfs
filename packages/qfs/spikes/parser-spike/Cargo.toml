[package]
name = "parser-spike"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish = false
description = "THROWAWAY t02 spike — winnow-vs-chumsky parser comparison. NOT production. The durable artifact is docs/adr/0001-parser-library.md; this crate is comparison evidence only and is excluded from the published surface (publish = false). qfs-parser does NOT depend on it."

# Both candidate libraries live here ONLY (not in qfs-parser): the spike is the
# head-to-head. The winning library is promoted into qfs-parser separately.
[dependencies]
winnow = "1.0.3"
chumsky = "0.13.0"

# Spikes legitimately use unwrap/expect on hardcoded inputs and in the comparison
# harness. The strict workspace lint policy is relaxed HERE ONLY (see lib.rs
# inner attributes); it is NOT relaxed for qfs-parser itself.
[lints]
workspace = true
